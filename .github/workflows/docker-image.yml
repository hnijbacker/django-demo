name: Build and push Docker image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: paridaen/django-web-app

jobs:
  print-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Show branch
        run: echo "Branch/tag is ${GITHUB_REF}"

  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      branch: ${{ steps.find-branch.outputs.branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # checkout tag

      - name: Find branch containing tag commit
        id: find-branch
        run: |
          COMMIT_SHA=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          echo "Commit SHA: $COMMIT_SHA"

          echo "Remote branches containing commit:"
          git fetch --all --quiet
          BRANCHES=$(git branch -r --contains "$COMMIT_SHA" | sed 's|origin/||' | tr '\n' ' ')
          echo "Branches: $BRANCHES"

          # Pick the first branch (you can change selection logic here)
          MAIN_BRANCH=$(echo "$BRANCHES" | awk '{print $1}')
          echo "Selected branch: $MAIN_BRANCH"

          # Set output for later steps
          echo "branch=$MAIN_BRANCH" >> $GITHUB_OUTPUT

      - name: Show selected branch
        run: |
          echo "Branch for tag is: '${{ steps.find-branch.outputs.branch }}'"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=false

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-deployment-repo:
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME_TAG: ${{ needs.build-and-push.outputs.image }}
      BRANCH: ${{ steps.find-branch.outputs.branch }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: hnijbacker/django-deployment
          token: ${{ secrets.DJANGO_DEPLOYMENT_TOKEN }} # PAT with push permission
          path: deployment-repo
          ref: ${{ env.BRANCH }} # check out specific branch

      - name: Update manifest with tag from previous job
        run: |
          cd deployment-repo
          FILE="base/django-deployment.yaml" # path to manifest in deployment repo
          yq eval -i '.spec.template.spec.containers[0].image = "${{ env.IMAGE_NAME_TAG }}"' "$FILE"

      - name: Commit changes
        run: |
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update image tag to ${{ env.IMAGE_NAME_TAG }}"
          git push
