name: Build and push Docker image

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: paridaen/django-web-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-deployment-repo:
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: hnijbacker/django-deployment
          token: ${{ secrets.DJANGO_DEPLOYMENT_TOKEN }} # PAT with push permission
          path: deployment-repo

      - name: Update manifest with tag from previous job
        run: |
          cd deployment-repo
          FILE="base/django-deployment.yaml" # path to manifest in deployment repo
          yq e -i '.spec.template.spec.containers[0].image |= (split(":")[0] + ":${{ env.IMAGE_TAG }}") "$FILE"

      - name: Commit changes
        run: |
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update image tag to ${{ env.IMAGE }}"
          git push
