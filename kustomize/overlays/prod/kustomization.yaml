apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - ../../base

namespace: django-prod

replicas:
  - name: django-web-app
    count: 5
# The image name and tag will be replaced automatically by GitHub Actions
images:
  - name: paridaen/django-web-app
    newName: paridaen/django-web-app
    newTag: PLACEHOLDER_VERSION

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/environment: dev
  app.kubernetes.io/version: PLACEHOLDER_VERSION

commonAnnotations:
  git.sha: PLACEHOLDER_GIT_SHA