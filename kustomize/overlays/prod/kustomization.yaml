apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - ../../base

namespace: django-prod

replicas:
  - name: django-web-app
    count: 5
# The image name and tag will be replaced automatically by GitHub Actions
images:
  - name: ghcr.io/hnijbacker/django-web-app
    newName: ghcr.io/hnijbacker/django-web-app
    newTag: PLACEHOLDER_VERSION

patches:
  - patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: django-prod.nijbacker.net
    target:
      kind: HTTPRoute
      name: django-demo
  
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: prod
    includeSelectors: true
    includeTemplates: true
  - pairs:
      app.kubernetes.io/version: PLACEHOLDER_VERSION
    includeSelectors: false
    includeTemplates: true

commonAnnotations:
  git.sha: PLACEHOLDER_GIT_SHA